<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Dar-ul-Sukun ERMS{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    {% block css %}{% endblock %}

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="sidebar">

    <div class="logo-box">

        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo">

        <h2>Dar-ul-Sukun</h2>

        <span>ERMS</span>

    </div>

    <ul>

         <li><a href="{{ url_for('auth.dashboard') }}"><i class="fa-solid fa-house"></i> Dashboard</a></li>

         <li>
    <a href="{{ url_for('employee.employee_list') }}">
        <i class="fa-solid fa-users"></i> Employees
    </a>
</li>

<li>
    <a href="{{ url_for('designation.list_designations') }}">
        <i class="fa-solid fa-briefcase"></i> Designations
    </a>
</li>

         <li><a href="#"><i class="fa-solid fa-chart-column"></i> Reports</a></li>

         <li><a href="#"><i class="fa-solid fa-user"></i> My Profile</a></li>

         <li><a href="#"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>

        
    </ul>

</div>

<div class="main">

<header>

<div class="header-left">

<h2>Dar-ul-Sukun Employee Record Management System</h2>

</div>

<div class="header-right">

<i class="fa-solid fa-bell"></i>

<div id="datetime"></div>

<div class="profile">

<i class="fa-solid fa-circle-user"></i>

Supervisor

</div>

</div>

</header>

{% block content %}
{% endblock %}

</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

{% block js %}{% endblock %}

</body>
</html>
