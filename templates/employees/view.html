<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  
    <link rel="stylesheet" href="{{ url_for('static', filename='css/view.css') }}">
</head>
<body>
    <h1 class="page-title">Employee Profile</h1>

<div class="profile-container">

    <h2 class="section-title">Biodata</h2>

    <div class="profile-item">
        <strong>Name:</strong> {{ emp.employee_name }}
    </div>

    <div class="profile-item">
        <strong>Father Name:</strong> {{ emp.father_name }}
    </div>

    <div class="profile-item">
        <strong>CNIC:</strong> {{ emp.cnic }}
    </div>

    <h2 class="section-title">Contact Information</h2>

    <div class="profile-item">
        <strong>Phone:</strong> {{ emp.phone }}
    </div>

    <div class="profile-item">
        <strong>Email:</strong> {{ emp.email }}
    </div>

    <a href="{{ url_for('employee.employee_list') }}" class="back-btn">
        Back to Employee List
    </a>

</div>



</body>
</html>
