<!DOCTYPE html>
<html>
<head>
    <title>Add Document</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/common.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/employee.css') }}">
</head>

<body>

<h1 class="page-title">Upload Employee Document</h1>

<div class="employee-container">

    <form method="POST" enctype="multipart/form-data">

        <div class="form-grid">

            <div class="form-group">
                <label>Employee</label>

                <select name="employee_id" required>

                    <option value="">Select Employee</option>

                    {% for emp in employees %}
                    <option value="{{ emp.employee_id }}">
                        {{ emp.employee_code }} - {{ emp.employee_name }}
                    </option>
                    {% endfor %}

                </select>
            </div>

            <div class="form-group">
                <label>Document Type</label>

                <select name="document_type" required>

                    <option value="">Select Document Type</option>

                    <option value="CNIC">CNIC</option>
                    <option value="Matric Certificate">Matric Certificate</option>
                    <option value="Intermediate Certificate">Intermediate Certificate</option>
                    <option value="Bachelor Degree">Bachelor Degree</option>
                    <option value="Master Degree">Master Degree</option>
                    <option value="Experience Certificate">Experience Certificate</option>
                    <option value="Joining Letter">Joining Letter</option>
                    <option value="Promotion Letter">Promotion Letter</option>
                    <option value="Transfer Letter">Transfer Letter</option>
                    <option value="Resume">Resume / CV</option>
                    <option value="Other">Other</option>

                </select>

            </div>

            <div class="form-group">
                <label>Select File</label>

                <input type="file"
                       name="document_file"
                       required>
            </div>


             <label>File Path</label>
                <input type="text"
                       name="file_path">

            <div class="form-group">
                <label>Notes</label>

                <textarea name="notes"
                          rows="4"
                          placeholder="Additional remarks..."></textarea>
            </div>

        </div>

        <button type="submit" class="save-btn">
            Upload Document
        </button>

    </form>

</div>

</body>
</html>
